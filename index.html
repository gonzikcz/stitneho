<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Floors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .layout {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 28px;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      letter-spacing: 1px;
      text-align: center;
    }

    .viewer {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .arrow {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 2rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
      flex-shrink: 0;
    }

    .arrow:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .arrow:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .nav-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .jump-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #ddd;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .jump-btn:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .image-wrap {
      width: clamp(400px, 68vw, 1100px);
      height: 82vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 8px;
    }

    .image-wrap img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      display: block;
    }

    .annotation {
      position: absolute;
      width: 28px;
      height: 28px;
      background: #ffcc00;
      color: #111;
      border: 2px solid #fff;
      border-radius: 50%;
      cursor: grab;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      font-size: 11px;
      font-weight: bold;
      display: none;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 10;
      transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    .annotation.visible {
      display: flex;
    }

    .annotation.dragging {
      cursor: grabbing;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.8);
      z-index: 20;
    }

    .annotation.highlighted {
      background: #ff4422;
      color: #fff;
      border-color: #fff;
      box-shadow: 0 0 14px rgba(255, 68, 34, 0.85);
      transform: translate(-50%, -50%) scale(1.35);
      z-index: 15;
    }

    .annotation.dragging.highlighted {
      z-index: 20;
    }

    .counter {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
    }

    /* Side panel */
    .side-panel {
      width: 175px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 10px;
      margin-top: 62px;
      flex-shrink: 0;
    }

    .side-panel h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
    }

    .byt-item {
      padding: 7px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      line-height: 1.4;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .byt-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .byt-item.active {
      background: rgba(255, 68, 34, 0.18);
      border-color: rgba(255, 68, 34, 0.5);
    }

    .byt-item.empty {
      opacity: 0.4;
      cursor: default;
    }

    .byt-item.empty:hover {
      background: none;
    }

    .byt-name {
      font-weight: bold;
      color: #eee;
    }

    .byt-kominy {
      color: #aaa;
      font-size: 0.78rem;
    }
  </style>
</head>
<body>

  <div class="layout">
    <div class="main">
      <h1 id="title"></h1>

      <div class="viewer">
        <div class="nav-col">
          <button class="jump-btn" onclick="jumpTo(0)">Sklep</button>
          <button class="arrow" id="prev" onclick="navigate(-1)">&#8592;</button>
        </div>
        <div class="image-wrap" id="image-wrap">
          <img id="photo" src="" alt="">
        </div>
        <div class="nav-col">
          <button class="jump-btn" onclick="jumpTo(5)">Strecha</button>
          <button class="arrow" id="next" onclick="navigate(1)">&#8594;</button>
        </div>
      </div>

      <div class="counter" id="counter"></div>
      <button id="export-btn" onclick="exportPositions()" style="margin-top:12px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.3);color:#ccc;padding:6px 14px;border-radius:6px;cursor:pointer;font-size:0.8rem;">Copy positions (current picture)</button>
      <div id="export-msg" style="margin-top:6px;font-size:0.75rem;color:#6f6;display:none;">Copied to clipboard!</div>
    </div>

    <div class="side-panel">
      <h2>Byty &amp; komíny</h2>
      <div id="byt-list"></div>
    </div>
  </div>

  <script>
    const pictures = [
      "0_sklep.jpg",
      "1_patro.jpg",
      "2_patro.jpg",
      "3_patro.jpg",
      "4_puda.jpg",
      "5_strecha.jpg"
    ];

    const ANNOTATION_COUNT = 22;
    let current = 0;
    let activeByt = null;

    const bytyKominy = [
      { byt: 1, kominy: [5, 6] },
      { byt: 2, kominy: [] },
      { byt: 3, kominy: [2, 8] },
      { byt: 4, kominy: [2] },
      { byt: 5, kominy: [4, 9] },
      { byt: 6, kominy: [1] },
      { byt: 7, kominy: [16] },
    ];

    function defaultPos(i) {
      return {
        fx: 0.025 + (i % 3) * 0.06,
        fy: 0.025 + Math.floor(i / 3) * 0.055
      };
    }

    const sklep0Pos = [
      {fx:0.5267,fy:0.4564},{fx:0.5617,fy:0.4719},{fx:0.655, fy:0.4891},
      {fx:0.6642,fy:0.5432},{fx:0.6967,fy:0.5023},{fx:0.7608,fy:0.634 },
      {fx:0.6467,fy:0.6091},{fx:0.6117,fy:0.6582},{fx:0.5817,fy:0.6091},
      {fx:0.3325,fy:0.438 },{fx:0.2975,fy:0.4352},{fx:0.2675,fy:0.4189},
      {fx:0.32,  fy:0.5429},{fx:0.2858,fy:0.5302},{fx:0.2483,fy:0.5375},
      {fx:0.0275,fy:0.0475},{fx:0.1425,fy:0.5162},{fx:0.1492,fy:0.5425},
      {fx:0.1733,fy:0.5421},{fx:0.1533,fy:0.5939},{fx:0.1533,fy:0.6238},
      {fx:0.0633,fy:0.0458}
    ];

    const patro1Pos = [
      {fx:0.5449,fy:0.4692},{fx:0.5768,fy:0.5115},{fx:0.6686,fy:0.4998},
      {fx:0.6826,fy:0.5431},{fx:0.7227,fy:0.5179},{fx:0.7238,fy:0.6555},
      {fx:0.6418,fy:0.6134},{fx:0.6212,fy:0.662 },{fx:0.5988,fy:0.6098},
      {fx:0.3085,fy:0.4373},{fx:0.2915,fy:0.3977},{fx:0.2628,fy:0.4292},
      {fx:0.3085,fy:0.575 },{fx:0.2843,fy:0.5346},{fx:0.2682,fy:0.5759},
      {fx:0.015, fy:0.0446},{fx:0.1076,fy:0.5446},{fx:0.1242,fy:0.5671},
      {fx:0.1246,fy:0.5924},{fx:0.1185,fy:0.6149},{fx:0.1051,fy:0.6383},
      {fx:0.0495,fy:0.0431}
    ];

    const patro2Pos = [
      {fx:0.5158,fy:0.4893},{fx:0.5267,fy:0.5338},{fx:0.5858,fy:0.5097},
      {fx:0.61,  fy:0.5545},{fx:0.7,   fy:0.5396},{fx:0.7342,fy:0.6742},
      {fx:0.62,  fy:0.6336},{fx:0.595, fy:0.6763},{fx:0.57,  fy:0.6318},
      {fx:0.3108,fy:0.4667},{fx:0.2983,fy:0.4221},{fx:0.2675,fy:0.4546},
      {fx:0.2992,fy:0.5988},{fx:0.2808,fy:0.5598},{fx:0.2617,fy:0.5997},
      {fx:0.035, fy:0.0382},{fx:0.1192,fy:0.5721},{fx:0.135, fy:0.5906},
      {fx:0.1375,fy:0.6131},{fx:0.1367,fy:0.6373},{fx:0.12,  fy:0.6568},
      {fx:0.0667,fy:0.0395}
    ];

    const patro3Pos = [
      {fx:0.5,   fy:0.4683},{fx:0.5208,fy:0.5148},{fx:0.595, fy:0.5008},
      {fx:0.6208,fy:0.5465},{fx:0.7292,fy:0.5224},{fx:0.75,  fy:0.6553},
      {fx:0.6208,fy:0.622 },{fx:0.5983,fy:0.6629},{fx:0.5767,fy:0.6192},
      {fx:0.2967,fy:0.4446},{fx:0.2867,fy:0.4   },{fx:0.2567,fy:0.4344},
      {fx:0.2883,fy:0.5805},{fx:0.2683,fy:0.5368},{fx:0.2492,fy:0.5786},
      {fx:0.0275,fy:0.0426},{fx:0.1075,fy:0.5509},{fx:0.12,  fy:0.5714},
      {fx:0.1217,fy:0.5957},{fx:0.1208,fy:0.6199},{fx:0.1075,fy:0.645 },
      {fx:0.0558,fy:0.0429}
    ];

    const puda4Pos = [
      {fx:0.5219,fy:0.4638},{fx:0.5465,fy:0.5043},{fx:0.6658,fy:0.5043},
      {fx:0.6937,fy:0.5494},{fx:0.8645,fy:0.5458},{fx:0.8607,fy:0.6897},
      {fx:0.6831,fy:0.6593},{fx:0.6634,fy:0.6944},{fx:0.6419,fy:0.6557},
      {fx:0.3155,fy:0.4373},{fx:0.3029,fy:0.3959},{fx:0.2708,fy:0.4265},
      {fx:0.2783,fy:0.5894},{fx:0.2577,fy:0.5526},{fx:0.2362,fy:0.5921},
      {fx:0.1331,fy:0.4205},{fx:0.077, fy:0.5491},{fx:0.0892,fy:0.5734},
      {fx:0.0897,fy:0.6014},{fx:0.0894,fy:0.6266},{fx:0.0733,fy:0.6482},
      {fx:0.0401,fy:0.7427}
    ];

    const strecha5Pos = [
      {fx:0.6475,fy:0.3647},{fx:0.6742,fy:0.2883},{fx:0.6842,fy:0.3817},
      {fx:0.7117,fy:0.3114},{fx:0.9175,fy:0.3836},{fx:0.91,  fy:0.6851},
      {fx:0.7525,fy:0.7082},{fx:0.7217,fy:0.7719},{fx:0.6958,fy:0.6998},
      {fx:0.27,  fy:0.156 },{fx:0.25,  fy:0.0605},{fx:0.2158,fy:0.1306},
      {fx:0.3025,fy:0.6017},{fx:0.2708,fy:0.5231},{fx:0.255, fy:0.6229},
      {fx:0.1083,fy:0.2214},{fx:0.0192,fy:0.6163},{fx:0.035, fy:0.6567},
      {fx:0.0375,fy:0.7159},{fx:0.0408,fy:0.7711},{fx:0.04,  fy:0.8412},
      {fx:0.1033,fy:0.8813}
    ];

    // Per-picture positions: positions[pictureIndex][annotationIndex] = {fx, fy}
    const positions = pictures.map((_, picIndex) =>
      Array.from({ length: ANNOTATION_COUNT }, (_, i) =>
        picIndex === 5 ? { ...strecha5Pos[i] } :
        picIndex === 4 ? { ...puda4Pos[i] } :
        picIndex === 3 ? { ...patro3Pos[i] } :
        picIndex === 2 ? { ...patro2Pos[i] } :
        picIndex === 1 ? { ...patro1Pos[i] } :
        { ...sklep0Pos[i] }
      )
    );

    // Annotation numbers (1-based) to hide per picture
    const hiddenPerPicture = [
      new Set([16, 22]), // 0_sklep
      new Set([16, 22]), // 1_patro
      new Set([16, 22]), // 2_patro
      new Set([16, 22]), // 3_patro
      new Set(),         // 4_puda
      new Set(),         // 5_strecha
    ];

    // The 22 DOM elements (reused across pictures)
    const annEls = [];

    function nameFromFile(filename) {
      return filename.replace(/\.[^.]+$/, "").replace(/_/g, " ");
    }

    function applyPositions(picIndex) {
      const img = document.getElementById("photo");
      const ox = img.offsetLeft;
      const oy = img.offsetTop;
      const w  = img.offsetWidth;
      const h  = img.offsetHeight;
      positions[picIndex].forEach((pos, i) => {
        annEls[i].style.left = (ox + pos.fx * w) + "px";
        annEls[i].style.top  = (oy + pos.fy * h) + "px";
      });
    }

    function updateHighlights() {
      const entry = activeByt !== null ? bytyKominy.find(b => b.byt === activeByt) : null;
      const highlighted = new Set(entry ? entry.kominy : []);
      annEls.forEach((el, i) => {
        el.classList.toggle("highlighted", highlighted.has(i + 1));
      });
    }

    function show(index) {
      document.getElementById("photo").src = pictures[index];
      document.getElementById("photo").alt = nameFromFile(pictures[index]);
      document.getElementById("title").textContent = nameFromFile(pictures[index]);
      document.getElementById("counter").textContent = (index + 1) + " / " + pictures.length;
      document.getElementById("prev").disabled = index === 0;
      document.getElementById("next").disabled = index === pictures.length - 1;

      annEls.forEach(el => el.classList.remove("visible"));
    }

    function selectByt(bytNum) {
      activeByt = activeByt === bytNum ? null : bytNum;
      updateHighlights();
      // Update active state in list
      document.querySelectorAll(".byt-item").forEach(el => {
        el.classList.toggle("active", parseInt(el.dataset.byt) === activeByt);
      });
    }

    function buildBytList() {
      const container = document.getElementById("byt-list");
      bytyKominy.forEach(({ byt, kominy }) => {
        const div = document.createElement("div");
        div.className = "byt-item" + (kominy.length === 0 ? " empty" : "");
        div.dataset.byt = byt;
        div.innerHTML =
          `<div class="byt-name">Byt č.${byt}</div>` +
          `<div class="byt-kominy">${kominy.length ? "komíny: " + kominy.join(", ") : "—"}</div>`;
        if (kominy.length > 0) {
          div.addEventListener("click", () => selectByt(byt));
        }
        container.appendChild(div);
      });
    }

    function jumpTo(index) {
      current = index;
      show(current);
    }

    function navigate(dir) {
      const next = current + dir;
      if (next >= 0 && next < pictures.length) {
        current = next;
        show(current);
      }
    }

    function initAnnotations() {
      const wrap = document.getElementById("image-wrap");
      for (let i = 0; i < ANNOTATION_COUNT; i++) {
        const el = document.createElement("div");
        el.className = "annotation";
        el.textContent = i + 1;
        wrap.appendChild(el);
        annEls.push(el);
        makeDraggable(el, i);
      }
    }

    function makeDraggable(el, annIndex) {
      let startMouseX, startMouseY, startLeft, startTop;

      function onStart(clientX, clientY) {
        startMouseX = clientX;
        startMouseY = clientY;
        startLeft = parseFloat(el.style.left) || 0;
        startTop  = parseFloat(el.style.top)  || 0;
        el.classList.add("dragging");
      }

      function onMove(clientX, clientY) {
        const img = document.getElementById("photo");
        const ox = img.offsetLeft;
        const oy = img.offsetTop;
        let newLeft = startLeft + (clientX - startMouseX);
        let newTop  = startTop  + (clientY - startMouseY);
        newLeft = Math.max(ox, Math.min(ox + img.offsetWidth,  newLeft));
        newTop  = Math.max(oy, Math.min(oy + img.offsetHeight, newTop));
        el.style.left = newLeft + "px";
        el.style.top  = newTop  + "px";
        positions[current][annIndex].fx = (newLeft - ox) / img.offsetWidth;
        positions[current][annIndex].fy = (newTop  - oy) / img.offsetHeight;
      }

      function onEnd() {
        el.classList.remove("dragging");
      }

      el.addEventListener("mousedown", function (e) {
        onStart(e.clientX, e.clientY);
        e.preventDefault();
        function move(e) { onMove(e.clientX, e.clientY); }
        function up()    { onEnd(); document.removeEventListener("mousemove", move); document.removeEventListener("mouseup", up); }
        document.addEventListener("mousemove", move);
        document.addEventListener("mouseup", up);
      });

      el.addEventListener("touchstart", function (e) {
        const t = e.touches[0];
        onStart(t.clientX, t.clientY);
        e.preventDefault();
        function move(e) { const t = e.touches[0]; onMove(t.clientX, t.clientY); }
        function end()   { onEnd(); document.removeEventListener("touchmove", move); document.removeEventListener("touchend", end); }
        document.addEventListener("touchmove", move, { passive: false });
        document.addEventListener("touchend", end);
      }, { passive: false });
    }

    document.getElementById("photo").addEventListener("load", function () {
      const hidden = hiddenPerPicture[current];
      annEls.forEach((el, i) => {
        el.classList.toggle("visible", !hidden.has(i + 1));
      });
      updateHighlights();
      applyPositions(current);
    });

    window.addEventListener("resize", function () {
      applyPositions(current);
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "ArrowLeft")  navigate(-1);
      if (e.key === "ArrowRight") navigate(1);
    });

    function exportPositions() {
      const data = positions[current].map((p, i) => ({
        n: i + 1, fx: +p.fx.toFixed(4), fy: +p.fy.toFixed(4)
      }));
      navigator.clipboard.writeText(JSON.stringify(data, null, 2)).then(() => {
        const msg = document.getElementById("export-msg");
        msg.style.display = "block";
        setTimeout(() => msg.style.display = "none", 2000);
      });
    }

    buildBytList();
    initAnnotations();
    show(0);
  </script>

</body>
</html>
