<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>House Floors</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #1a1a1a;
      color: #fff;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .layout {
      display: flex;
      flex-direction: row;
      align-items: flex-start;
      gap: 28px;
    }

    .main {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 24px;
      letter-spacing: 1px;
      text-align: center;
    }

    .viewer {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .arrow {
      background: rgba(255, 255, 255, 0.1);
      border: 2px solid rgba(255, 255, 255, 0.3);
      color: #fff;
      font-size: 2rem;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, border-color 0.2s;
      user-select: none;
      flex-shrink: 0;
    }

    .arrow:hover {
      background: rgba(255, 255, 255, 0.25);
      border-color: rgba(255, 255, 255, 0.6);
    }

    .arrow:disabled {
      opacity: 0.2;
      cursor: default;
    }

    .nav-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .jump-btn {
      background: rgba(255, 255, 255, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.3);
      color: #ddd;
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.8rem;
      white-space: nowrap;
      transition: background 0.2s;
    }

    .jump-btn:hover {
      background: rgba(255, 255, 255, 0.22);
    }

    .image-wrap {
      width: clamp(400px, 68vw, 1100px);
      height: 82vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      background: rgba(0, 0, 0, 0.25);
      border-radius: 8px;
    }

    .image-wrap img {
      max-width: 100%;
      max-height: 100%;
      border-radius: 8px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
      display: block;
    }

    .annotation {
      position: absolute;
      width: 28px;
      height: 28px;
      background: #ffcc00;
      color: #111;
      border: 2px solid #fff;
      border-radius: 50%;
      cursor: default;
      transform: translate(-50%, -50%);
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      font-size: 11px;
      font-weight: bold;
      display: none;
      align-items: center;
      justify-content: center;
      user-select: none;
      z-index: 10;
      transition: background 0.15s, box-shadow 0.15s, transform 0.15s;
    }

    .annotation.visible {
      display: flex;
    }

    .annotation.highlighted {
      background: #ff4422;
      color: #fff;
      border-color: #fff;
      box-shadow: 0 0 14px rgba(255, 68, 34, 0.85);
      transform: translate(-50%, -50%) scale(1.35);
      z-index: 15;
    }

    .ann-tooltip {
      position: fixed;
      background: #222;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 7px;
      padding: 8px 11px;
      font-size: 0.8rem;
      line-height: 1.5;
      color: #eee;
      pointer-events: none;
      z-index: 100;
      max-width: 220px;
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.7);
      display: none;
    }

    .ann-tooltip .tt-vyuziti {
      font-weight: bold;
      color: #ffcc00;
    }

    .ann-tooltip .tt-poznamka {
      color: #bbb;
      font-size: 0.75rem;
      margin-top: 3px;
    }

    .counter {
      margin-top: 16px;
      font-size: 0.9rem;
      color: #aaa;
      text-align: center;
    }

    /* Side panel */
    .side-panel {
      width: 175px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 10px;
      margin-top: 62px;
      flex-shrink: 0;
    }

    .side-panel h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
    }

    .byt-item {
      padding: 7px 8px;
      border-radius: 6px;
      margin-bottom: 4px;
      cursor: pointer;
      font-size: 0.82rem;
      line-height: 1.4;
      transition: background 0.15s;
      border: 1px solid transparent;
    }

    .byt-item:hover {
      background: rgba(255, 255, 255, 0.08);
    }

    .byt-item.active {
      background: rgba(255, 68, 34, 0.18);
      border-color: rgba(255, 68, 34, 0.5);
    }

    .byt-item.empty {
      opacity: 0.4;
      cursor: default;
    }

    .byt-item.empty:hover {
      background: none;
    }

    .byt-name {
      font-weight: bold;
      color: #eee;
    }

    .byt-kominy {
      color: #aaa;
      font-size: 0.78rem;
    }

    .panels-col {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .info-box {
      width: 175px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      padding: 12px 10px;
      flex-shrink: 0;
      display: none;
    }

    .info-box h2 {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #888;
      margin-bottom: 10px;
    }

    .komin-entry {
      padding: 5px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.07);
      font-size: 0.8rem;
      line-height: 1.4;
    }

    .komin-entry:last-child {
      border-bottom: none;
    }

    .komin-num {
      font-weight: bold;
      color: #ffcc00;
      margin-right: 4px;
    }

    .komin-vyuziti {
      color: #eee;
    }

    .komin-poznamka {
      color: #999;
      font-size: 0.74rem;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div class="layout">
    <div class="main">
      <h1 id="title"></h1>

      <div class="viewer">
        <div class="nav-col">
          <button class="jump-btn" onclick="jumpTo(0)">Sklep</button>
          <button class="arrow" id="prev" onclick="navigate(-1)">&#8592;</button>
        </div>
        <div class="image-wrap" id="image-wrap">
          <img id="photo" src="" alt="">
          <div class="ann-tooltip" id="ann-tooltip"></div>
        </div>
        <div class="nav-col">
          <button class="jump-btn" onclick="jumpTo(5)">Strecha</button>
          <button class="arrow" id="next" onclick="navigate(1)">&#8594;</button>
        </div>
      </div>

      <div class="counter" id="counter"></div>
    </div>

    <div class="panels-col">
      <div class="side-panel">
        <h2>Byty &amp; komíny</h2>
        <div id="byt-list"></div>
      </div>
      <div class="info-box" id="info-box">
        <h2>Využití komínů</h2>
        <div id="komin-info-list"></div>
      </div>
    </div>
  </div>

  <script>
    const pictures = [
      "0_sklep.jpg",
      "1_patro.jpg",
      "2_patro.jpg",
      "3_patro.jpg",
      "4_puda.jpg",
      "5_strecha.jpg"
    ];

    const ANNOTATION_COUNT = 22;
    let current = 0;
    let activeByt = null;

    const kominyVyuziti = [
      { komin:  1, vyuziti: 'krb?',                          poznamka: 'vyvložkováno nerezem průměrem 160mm přes bytovou jednotku č. 2 až do sklepa' },
      { komin:  2, vyuziti: '',                               poznamka: '' },
      { komin:  3, vyuziti: 'krb?',                          poznamka: 'vyvložkováno nerezem průměrem 160mm' },
      { komin:  4, vyuziti: 'kotel?',                        poznamka: 'vyvložkováno nerezem 80/125 až do sklepa' },
      { komin:  5, vyuziti: 'kotel?',                        poznamka: '' },
      { komin:  6, vyuziti: 'kotel?',                        poznamka: 'vyvložkována nerezem 80/125' },
      { komin:  7, vyuziti: 'odpady',                        poznamka: 'není spalinová cesta' },
      { komin:  8, vyuziti: '',                               poznamka: '' },
      { komin:  9, vyuziti: '',                               poznamka: '' },
      { komin: 10, vyuziti: '',                               poznamka: '' },
      { komin: 11, vyuziti: '',                               poznamka: '' },
      { komin: 12, vyuziti: '',                               poznamka: '' },
      { komin: 13, vyuziti: 'kotel',                         poznamka: 'vyvložkováno kovovým materiálem až do sklepního prostoru pro využití atmosférického kotle' },
      { komin: 14, vyuziti: 'ventilace',                     poznamka: '' },
      { komin: 15, vyuziti: 'kotel byt č.3 a kotel byt č.4',poznamka: 'starší typ kotlů a vložek' },
      { komin: 16, vyuziti: '',                               poznamka: '' },
      { komin: 17, vyuziti: 'kotel',                         poznamka: '' },
      { komin: 18, vyuziti: 'digestoř',                      poznamka: '' },
      { komin: 19, vyuziti: 'digestoř',                      poznamka: 'stará vložka' },
      { komin: 20, vyuziti: '',                               poznamka: '' },
      { komin: 21, vyuziti: 'digestoř',                      poznamka: '' },
      { komin: 22, vyuziti: 'kotel',                         poznamka: '' },
    ];

    const bytyKominy = [
      { byt: 1, kominy: [21, 22] },
      { byt: 2, kominy: [1, 4, 13] },
      { byt: 3, kominy: [15, 19] },
      { byt: 4, kominy: [15] },
      { byt: 5, kominy: [17, 18] },
      { byt: 6, kominy: [3, 6, 7, 14] },
      { byt: 7, kominy: [5] },
    ];

    function defaultPos(i) {
      return {
        fx: 0.025 + (i % 3) * 0.06,
        fy: 0.025 + Math.floor(i / 3) * 0.055
      };
    }

    const sklep0Pos = [
      {fx:0.3322,fy:0.4405},{fx:0.2972,fy:0.4372},{fx:0.2677,fy:0.4267},
      {fx:0.2487,fy:0.5313},{fx:0.2876,fy:0.5281},{fx:0.319, fy:0.5369},
      {fx:0.6467,fy:0.6091},{fx:0.1453,fy:0.5145},{fx:0.1499,fy:0.5447},
      {fx:0.177, fy:0.5431},{fx:0.1539,fy:0.5987},{fx:0.1793,fy:0.5973},
      {fx:0.1564,fy:0.6281},{fx:0.5185,fy:0.4955},{fx:0.5492,fy:0.5088},
      {fx:0.6448,fy:0.5341},{fx:0.6661,fy:0.5469},{fx:0.5801,fy:0.6109},
      {fx:0.6142,fy:0.6105},{fx:0.646, fy:0.6107},{fx:0.6915,fy:0.5485},
      {fx:0.7388,fy:0.6107}
    ];

    const patro1Pos = [
      {fx:0.3092,fy:0.4366},{fx:0.2923,fy:0.3941},{fx:0.263, fy:0.428 },
      {fx:0.2638,fy:0.5739},{fx:0.287, fy:0.5375},{fx:0.3144,fy:0.5744},
      {fx:0.6418,fy:0.6134},{fx:0.085, fy:0.5539},{fx:0.1218,fy:0.5772},
      {fx:0.0794,fy:0.5901},{fx:0.1234,fy:0.6046},{fx:0.1492,fy:0.6035},
      {fx:0.0888,fy:0.6374},{fx:0.5369,fy:0.5001},{fx:0.5874,fy:0.4762},
      {fx:0.661, fy:0.5385},{fx:0.6935,fy:0.5036},{fx:0.6003,fy:0.6547},
      {fx:0.6213,fy:0.612 },{fx:0.6453,fy:0.6559},{fx:0.7689,fy:0.5358},
      {fx:0.7425,fy:0.6535}
    ];

    const patro2Pos = [
      {fx:0.3149,fy:0.465 },{fx:0.2976,fy:0.4203},{fx:0.2676,fy:0.457 },
      {fx:0.2573,fy:0.6001},{fx:0.2773,fy:0.5568},{fx:0.3051,fy:0.5982},
      {fx:0.0427,fy:0.051 },{fx:0.1014,fy:0.579 },{fx:0.1364,fy:0.5974},
      {fx:0.0999,fy:0.6136},{fx:0.1401,fy:0.6268},{fx:0.1648,fy:0.6258},
      {fx:0.1265,fy:0.6606},{fx:0.4999,fy:0.5264},{fx:0.5453,fy:0.4933},
      {fx:0.5805,fy:0.5509},{fx:0.6219,fy:0.5194},{fx:0.5605,fy:0.6747},
      {fx:0.5984,fy:0.6313},{fx:0.6212,fy:0.6809},{fx:0.6964,fy:0.5413},
      {fx:0.734, fy:0.6748}
    ];

    const patro3Pos = [
      {fx:0.2955,fy:0.445 },{fx:0.2863,fy:0.3993},{fx:0.2559,fy:0.4349},
      {fx:0.2453,fy:0.5799},{fx:0.2674,fy:0.5376},{fx:0.29,  fy:0.5803},
      {fx:0.1763,fy:0.3981},{fx:0.0847,fy:0.5545},{fx:0.1222,fy:0.5766},
      {fx:0.0812,fy:0.5885},{fx:0.1231,fy:0.6047},{fx:0.1476,fy:0.6046},
      {fx:0.0883,fy:0.6352},{fx:0.4892,fy:0.5044},{fx:0.5328,fy:0.4783},
      {fx:0.5884,fy:0.538 },{fx:0.6293,fy:0.5094},{fx:0.5782,fy:0.6606},
      {fx:0.599, fy:0.6139},{fx:0.6244,fy:0.6604},{fx:0.722, fy:0.5244},
      {fx:0.7603,fy:0.6599}
    ];

    const puda4Pos = [
      {fx:0.3208,fy:0.4358},{fx:0.3022,fy:0.3897},{fx:0.2691,fy:0.4279},
      {fx:0.2346,fy:0.5913},{fx:0.2566,fy:0.5477},{fx:0.2776,fy:0.5909},
      {fx:0.1505,fy:0.4393},{fx:0.05,  fy:0.5555},{fx:0.09,  fy:0.5783},
      {fx:0.0455,fy:0.5939},{fx:0.0899,fy:0.6084},{fx:0.0862,fy:0.6371},
      {fx:0.0643,fy:0.6537},{fx:0.5121,fy:0.5023},{fx:0.5567,fy:0.4663},
      {fx:0.6574,fy:0.5426},{fx:0.7005,fy:0.5081},{fx:0.6429,fy:0.6964},
      {fx:0.6645,fy:0.6508},{fx:0.6909,fy:0.6965},{fx:0.8548,fy:0.5466},
      {fx:0.8537,fy:0.6914}
    ];

    const strecha5Pos = [
      {fx:0.276, fy:0.1686},{fx:0.2507,fy:0.0506},{fx:0.2164,fy:0.1538},
      {fx:0.2439,fy:0.6251},{fx:0.2698,fy:0.5037},{fx:0.3123,fy:0.6018},
      {fx:0.1216,fy:0.229 },{fx:0.0162,fy:0.5983},{fx:0.0385,fy:0.6535},
      {fx:0.0445,fy:0.7128},{fx:0.0498,fy:0.7729},{fx:0.0537,fy:0.8301},
      {fx:0.0341,fy:0.9075},{fx:0.646, fy:0.3814},{fx:0.6767,fy:0.2772},
      {fx:0.6887,fy:0.405 },{fx:0.7202,fy:0.311 },{fx:0.6927,fy:0.7867},
      {fx:0.7205,fy:0.6771},{fx:0.7494,fy:0.7853},{fx:0.9111,fy:0.3767},
      {fx:0.9015,fy:0.7543}
    ];

    // Per-picture positions: positions[pictureIndex][annotationIndex] = {fx, fy}
    const positions = pictures.map((_, picIndex) =>
      Array.from({ length: ANNOTATION_COUNT }, (_, i) =>
        picIndex === 5 ? { ...strecha5Pos[i] } :
        picIndex === 4 ? { ...puda4Pos[i] } :
        picIndex === 3 ? { ...patro3Pos[i] } :
        picIndex === 2 ? { ...patro2Pos[i] } :
        picIndex === 1 ? { ...patro1Pos[i] } :
        { ...sklep0Pos[i] }
      )
    );

    // Annotation numbers (1-based) to hide per picture
    const hiddenPerPicture = [
      new Set([7]), // 0_sklep
      new Set([7]), // 1_patro
      new Set([7]), // 2_patro
      new Set(),    // 3_patro
      new Set(),         // 4_puda
      new Set(),         // 5_strecha
    ];

    // The 22 DOM elements (reused across pictures)
    const annEls = [];

    function nameFromFile(filename) {
      return filename.replace(/\.[^.]+$/, "").replace(/_/g, " ");
    }

    function applyPositions(picIndex) {
      const img = document.getElementById("photo");
      const ox = img.offsetLeft;
      const oy = img.offsetTop;
      const w  = img.offsetWidth;
      const h  = img.offsetHeight;
      positions[picIndex].forEach((pos, i) => {
        annEls[i].style.left = (ox + pos.fx * w) + "px";
        annEls[i].style.top  = (oy + pos.fy * h) + "px";
      });
    }

    function updateHighlights() {
      const entry = activeByt !== null ? bytyKominy.find(b => b.byt === activeByt) : null;
      const highlighted = new Set(entry ? entry.kominy : []);
      annEls.forEach((el, i) => {
        el.classList.toggle("highlighted", highlighted.has(i + 1));
      });
    }

    function show(index) {
      document.getElementById("photo").src = pictures[index];
      document.getElementById("photo").alt = nameFromFile(pictures[index]);
      document.getElementById("title").textContent = nameFromFile(pictures[index]);
      document.getElementById("counter").textContent = (index + 1) + " / " + pictures.length;
      document.getElementById("prev").disabled = index === 0;
      document.getElementById("next").disabled = index === pictures.length - 1;

      annEls.forEach(el => el.classList.remove("visible"));
    }

    function updateVyuzitiBox() {
      const infoBox = document.getElementById("info-box");
      const list = document.getElementById("komin-info-list");
      list.innerHTML = "";
      if (activeByt === null) {
        infoBox.style.display = "none";
        return;
      }
      const entry = bytyKominy.find(b => b.byt === activeByt);
      if (!entry || entry.kominy.length === 0) {
        infoBox.style.display = "none";
        return;
      }
      entry.kominy.forEach(kNum => {
        const k = kominyVyuziti.find(x => x.komin === kNum);
        const div = document.createElement("div");
        div.className = "komin-entry";
        const vyuziti = k && k.vyuziti ? k.vyuziti : '—';
        const poznamka = k && k.poznamka ? k.poznamka : '';
        div.innerHTML =
          `<div><span class="komin-num">${kNum}.</span><span class="komin-vyuziti">${vyuziti}</span></div>` +
          (poznamka ? `<div class="komin-poznamka">${poznamka}</div>` : '');
        list.appendChild(div);
      });
      infoBox.style.display = "block";
    }

    function selectByt(bytNum) {
      activeByt = activeByt === bytNum ? null : bytNum;
      updateHighlights();
      updateVyuzitiBox();
      // Update active state in list
      document.querySelectorAll(".byt-item").forEach(el => {
        el.classList.toggle("active", parseInt(el.dataset.byt) === activeByt);
      });
    }

    function buildBytList() {
      const container = document.getElementById("byt-list");
      bytyKominy.forEach(({ byt, kominy }) => {
        const div = document.createElement("div");
        div.className = "byt-item" + (kominy.length === 0 ? " empty" : "");
        div.dataset.byt = byt;
        div.innerHTML =
          `<div class="byt-name">Byt č.${byt}</div>` +
          `<div class="byt-kominy">${kominy.length ? "komíny: " + kominy.join(", ") : "—"}</div>`;
        if (kominy.length > 0) {
          div.addEventListener("click", () => selectByt(byt));
        }
        container.appendChild(div);
      });
    }

    function jumpTo(index) {
      current = index;
      show(current);
    }

    function navigate(dir) {
      const next = current + dir;
      if (next >= 0 && next < pictures.length) {
        current = next;
        show(current);
      }
    }

    const tooltip = document.getElementById("ann-tooltip");

    function showTooltip(e, kominNum) {
      const k = kominyVyuziti.find(x => x.komin === kominNum);
      const vyuziti = k && k.vyuziti ? k.vyuziti : '—';
      const poznamka = k && k.poznamka ? k.poznamka : '';
      const byty = bytyKominy.filter(b => b.kominy.includes(kominNum)).map(b => `byt ${b.byt}`);
      const bytInfo = byty.length ? ` (${byty.join(', ')})` : '';
      tooltip.innerHTML =
        `<div class="tt-vyuziti">Komín ${kominNum}: ${vyuziti}${bytInfo}</div>` +
        (poznamka ? `<div class="tt-poznamka">${poznamka}</div>` : '');
      tooltip.style.display = 'block';
      moveTooltip(e);
    }

    function moveTooltip(e) {
      const offset = 14;
      let x = e.clientX + offset;
      let y = e.clientY + offset;
      if (x + 240 > window.innerWidth)  x = e.clientX - 240;
      if (y + 80  > window.innerHeight) y = e.clientY - 80;
      tooltip.style.left = x + 'px';
      tooltip.style.top  = y + 'px';
    }

    function hideTooltip() {
      tooltip.style.display = 'none';
    }

    function initAnnotations() {
      const wrap = document.getElementById("image-wrap");
      for (let i = 0; i < ANNOTATION_COUNT; i++) {
        const el = document.createElement("div");
        el.className = "annotation";
        el.textContent = i + 1;
        const kominNum = i + 1;
        el.addEventListener("mouseenter", e => showTooltip(e, kominNum));
        el.addEventListener("mousemove",  e => moveTooltip(e));
        el.addEventListener("mouseleave", hideTooltip);
        wrap.appendChild(el);
        annEls.push(el);
      }
    }

    document.getElementById("photo").addEventListener("load", function () {
      const hidden = hiddenPerPicture[current];
      annEls.forEach((el, i) => {
        el.classList.toggle("visible", !hidden.has(i + 1));
      });
      updateHighlights();
      applyPositions(current);
    });

    window.addEventListener("resize", function () {
      applyPositions(current);
    });

    document.addEventListener("keydown", function (e) {
      if (e.key === "ArrowLeft")  navigate(-1);
      if (e.key === "ArrowRight") navigate(1);
    });

    buildBytList();
    initAnnotations();
    show(0);
  </script>

</body>
</html>
